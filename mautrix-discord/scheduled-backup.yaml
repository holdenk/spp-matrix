apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mautrix-discord-db-backup
  namespace: matrix
  labels:
    app.kubernetes.io/name: mautrix-discord
    app.kubernetes.io/component: database-backup
spec:
  # Daily at 2:00 AM UTC (6-field cron: sec min hour dom month dow)
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: mautrix-discord-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io

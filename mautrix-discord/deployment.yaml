apiVersion: apps/v1
kind: Deployment
metadata:
  name: mautrix-discord
  namespace: matrix
  labels:
    app.kubernetes.io/name: mautrix-discord
    app.kubernetes.io/component: bridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mautrix-discord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mautrix-discord
        app.kubernetes.io/component: bridge
    spec:
      initContainers:
        # Inject secrets into the config template
        - name: config-inject
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cp /config-template/config.yaml /data/config.yaml
              escaped_db=$(printf '%s\n' "$DB_URI" | sed 's/[&/\\|]/\\&/g')
              escaped_as=$(printf '%s\n' "$AS_TOKEN" | sed 's/[&/\\|]/\\&/g')
              escaped_hs=$(printf '%s\n' "$HS_TOKEN" | sed 's/[&/\\|]/\\&/g')
              sed -i "s|__DB_URI__|${escaped_db}|g" /data/config.yaml
              sed -i "s|__AS_TOKEN__|${escaped_as}|g" /data/config.yaml
              sed -i "s|__HS_TOKEN__|${escaped_hs}|g" /data/config.yaml
          env:
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: mautrix-discord-secrets
                  key: database-uri
            - name: AS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mautrix-discord-secrets
                  key: as-token
            - name: HS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mautrix-discord-secrets
                  key: hs-token
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: data
              mountPath: /data
      containers:
        - name: mautrix-discord
          image: dock.mau.dev/mautrix/discord:latest
          ports:
            - containerPort: 29334
              name: appservice
          readinessProbe:
            tcpSocket:
              port: appservice
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: appservice
            initialDelaySeconds: 30
            periodSeconds: 60
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config-template
          configMap:
            name: mautrix-discord-config
        - name: data
          persistentVolumeClaim:
            claimName: mautrix-discord-data

name: Validate Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | \
            tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          find . -name '*.yaml' \
            -not -path './.github/*' \
            -not -path './secrets/*' \
            -not -path './backup-sidecar/*' \
            -not -path './ansible/*' \
            -not -path './matrix-site/_config.yml' | \
            xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -summary

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck backup-sidecar
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./backup-sidecar

      - name: ShellCheck scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backup-sidecar/Dockerfile

  website-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: matrix-site

      - name: Build website
        run: bundle exec jekyll build
        working-directory: matrix-site

apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-site
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matrix-site
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: site-content
          configMap:
            name: matrix-site-content
            items:
              - key: index.html
                path: index.html

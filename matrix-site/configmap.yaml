apiVersion: v1
kind: ConfigMap
metadata:
  name: matrix-site-content
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix-site
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Join Sparkling Pink Pandas Matrix</title>
        <style>
          body { font-family: Arial, sans-serif; line-height: 1.5; margin: 0; background: #fff7fb; color: #2e2030; }
          main { max-width: 760px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
          h1 { color: #b40069; }
          h2 { margin-top: 1.8rem; }
          .callout { background: #fff1f8; border-left: 4px solid #ff5fa2; padding: 0.8rem 1rem; border-radius: 6px; }
          code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 4px; }
        </style>
      </head>
      <body>
        <main>
          <h1>Join Sparkling Pink Pandas Matrix</h1>
          <p>Welcome! We're glad you're here. 🎉</p>

          <h2>1) Create your account in the web client</h2>
          <ol>
            <li>Open <a href="https://app.cinny.in/#/register">Cinny Web</a>.</li>
            <li>Choose <strong>Custom homeserver</strong>.</li>
            <li>Set homeserver to <code>https://matrix.sparklingpinkpandas.com</code>.</li>
            <li>Sign up using your invite code.</li>
          </ol>

          <div class="callout">
            <strong>No invite code yet?</strong>
            <ul>
              <li>Email <a href="mailto:info@sparklingpinkpandas.com">info@sparklingpinkpandas.com</a>, or</li>
              <li>Ask someone already on the server if they know someone who can vouch for you.</li>
            </ul>
          </div>

          <h2>2) Install your preferred phone app</h2>
          <p>After your account works in the web client, install your favorite Matrix phone client and sign in with the same account.</p>
          <ul>
            <li><a href="https://apps.apple.com/app/element-messenger/id1083446067">Element for iOS</a></li>
            <li><a href="https://play.google.com/store/apps/details?id=im.vector.app">Element for Android</a></li>
          </ul>

          <h2>3) Join community spaces</h2>
          <p>Ask an admin for links to the Space(s) you should join.</p>
        </main>
      </body>
    </html>

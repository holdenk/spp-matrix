apiVersion: apps/v1
kind: Deployment
metadata:
  name: spp-event-bot
  namespace: matrix
  labels:
    app.kubernetes.io/name: spp-event-bot
    app.kubernetes.io/component: bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spp-event-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spp-event-bot
        app.kubernetes.io/component: bot
    spec:
      containers:
        - name: event-bot
          image: ghcr.io/CHANGE_ME_ORG/spp-event-bot:latest
          envFrom:
            - configMapRef:
                name: spp-event-bot-config
            - secretRef:
                name: event-bot-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spp-event-bot-data

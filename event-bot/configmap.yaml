apiVersion: v1
kind: ConfigMap
metadata:
  name: spp-event-bot-config
  namespace: matrix
  labels:
    app.kubernetes.io/name: spp-event-bot
data:
  # XML event feed URL - configure when available
  FEED_URL: "https://example.com/events.xml"
  # Poll interval in seconds (default: 15 minutes)
  POLL_INTERVAL: "900"
  # Matrix homeserver (in-cluster address)
  MATRIX_HOMESERVER: "http://tuwunel.matrix.svc.cluster.local:6167"
  # Matrix room to post events to - set after creating the #rides room
  MATRIX_ROOM_ID: "!CHANGE_ME:sparklingpinkpandas.com"

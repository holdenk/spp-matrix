apiVersion: v1
kind: Secret
metadata:
  name: mautrix-discord-secrets
  namespace: matrix
type: Opaque
stringData:
  # Generate both tokens with: openssl rand -hex 32
  as-token: "CHANGE_ME"
  hs-token: "CHANGE_ME"
  # CNPG creates a secret named mautrix-discord-db-app with connection details.
  # Build the URI from that, or use the password from mautrix-discord-db-credentials.
  database-uri: "postgres://mautrix_discord:CHANGE_ME@mautrix-discord-db-rw.matrix.svc.cluster.local/mautrix_discord?sslmode=disable"

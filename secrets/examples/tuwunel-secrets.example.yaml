apiVersion: v1
kind: Secret
metadata:
  name: tuwunel-secrets
  namespace: matrix
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  # Share this token with people you want to invite to register
  registration-token: "CHANGE_ME"
  # Admin user access token for backup sidecar API calls
  # Obtain after creating admin user (see DEPLOY.md Phase 3.4):
  #   curl -s -X POST https://matrix.sparklingpinkpandas.com/_matrix/client/v3/login \
  #     -H 'Content-Type: application/json' \
  #     -d '{"type":"m.login.password","identifier":{"type":"m.id.user","user":"YOUR_ADMIN"},"password":"YOUR_PASS"}'
  # Use the "access_token" field from the response
  admin-token: "CHANGE_ME"

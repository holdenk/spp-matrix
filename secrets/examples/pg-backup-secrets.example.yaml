apiVersion: v1
kind: Secret
metadata:
  name: pg-backup
  namespace: matrix
type: Opaque
stringData:
  # Backblaze B2 S3-compatible credentials for CNPG PostgreSQL backup
  # Create a separate application key with read/write access to the PG backup bucket
  PG_ACCESS_KEY_ID: "CHANGE_ME"
  PG_ACCESS_SECRET_KEY: "CHANGE_ME"

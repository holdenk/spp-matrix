apiVersion: v1
kind: Secret
metadata:
  name: rclone-secrets
  namespace: matrix
type: Opaque
stringData:
  # B2 bucket name
  bucket: "matrix-backup-sparklingpinkpandas"
  # rclone config - get key ID and app key from Backblaze dashboard
  rclone.conf: |
    [b2]
    type = b2
    account = CHANGE_ME_B2_KEY_ID
    key = CHANGE_ME_B2_APP_KEY

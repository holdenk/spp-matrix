apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tuwunel-dinner
  namespace: matrix
  labels:
    app.kubernetes.io/name: tuwunel
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dinner.sparklingpinkpandas.com
      secretName: tuwunel-dinner-tls
  rules:
    - host: dinner.sparklingpinkpandas.com
      http:
        paths:
          # Serve .well-known delegation so Matrix clients can discover
          # the homeserver from dinner.sparklingpinkpandas.com
          - path: /.well-known/matrix
            pathType: Prefix
            backend:
              service:
                name: tuwunel
                port:
                  number: 6167
